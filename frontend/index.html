<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var v = "v6.2.0"; // Cache bust — 모바일 폰트/박스 균형 종합(버튼·표헤더·배지·min-width·funnel) 234차
        // [현 차수] 무한 새로고침 회로차단기 — localStorage 쓰기가 차단된 환경(사파리 프라이빗·쿠키차단·
        //   스토리지 정리 확장)에서는 아래 stored !== v 가 영구 참이 되어 매 로드마다 reload 가 반복됐다.
        //   부팅당 최대 3회로 제한하고, 초과하면 캐시버스트를 건너뛴다(앱은 정상 기동).
        var boots = 0;
        try { boots = parseInt(sessionStorage.getItem("roi_cachebust_reloads") || "0", 10) || 0; } catch (e) {}
        var stored = null;
        try { stored = localStorage.getItem("roi_help_ver"); } catch (e) { stored = v; /* 스토리지 불가 → 캐시버스트 건너뜀 */ }
        if (stored !== v && boots >= 3) { stored = v; }
        if (stored !== v) {
          try { sessionStorage.setItem("roi_cachebust_reloads", String(boots + 1)); } catch (e) {}
          // Phase 1: Unregister SW + clear caches
          localStorage.setItem("roi_help_ver", v);
          localStorage.setItem("roi_cache_phase", "1");
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }));
          }
          if ('caches' in window) {
            tasks.push(caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }));
          }
          // [현 차수] 정리 완료 시 폴백 타이머를 취소한다 — 취소되지 않던 2초 타이머가
          //   첫 reload 와 겹쳐 중복 새로고침을 일으켰다.
          var fallback = setTimeout(function() { window.location.reload(true); }, 2000);
          var done = false;
          var go = function() { if (done) return; done = true; clearTimeout(fallback); window.location.reload(true); };
          Promise.all(tasks).then(go).catch(go);
          return; // Stop execution
        } else if (localStorage.getItem("roi_cache_phase") === "1") {
          // Phase 2: SW is now unregistered, do one more reload to ensure fresh assets
          localStorage.removeItem("roi_cache_phase");
          window.location.reload(true);
          return;
        }
        // 정상 부팅 — 캐시버스트 회로차단기 카운터 해제.
        try { sessionStorage.removeItem("roi_cachebust_reloads"); } catch (e) {}

        // --- CRASH LOGGER ---
        window.addEventListener('error', function(e) {
            localStorage.setItem("LATEST_CRASH_ERR", String(e.error ? e.error.stack : e.message));
        });
        window.addEventListener('unhandledrejection', function(e) {
            localStorage.setItem("LATEST_CRASH_UNHANDLED", String(e.reason ? e.reason.stack || e.reason : e));
        });
        const origErr = console.error;
        console.error = function() {
            localStorage.setItem("LATEST_CRASH_CONSOLE", Array.from(arguments).map(String).join(' '));
            origErr.apply(console, arguments);
        };
      })();
    </script>
    <!-- ── 뷰포트 & 모바일 최적화 ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── SEO ── -->
    <title>GeniegoROI | 마케팅 성과 분석 · 멀티채널 어트리뷰션 · ROAS 최적화</title>
    <meta name="description" content="모든 채널의 마케팅 성과를 측정·기여도 분석·최적화하세요. 커머스 팀을 위한 ROAS 최적화, 고객 여정 분석, 멀티채널 어트리뷰션, LTV·CAC, 전환율 분석 플랫폼." />
    <meta name="keywords" content="마케팅 성과 분석, 멀티채널 어트리뷰션, ROAS 최적화, 고객 여정 분석, 전환율 최적화, LTV, CAC, 캠페인 성과 리포팅, 코호트 분석, marketing analytics, multi-channel attribution, ROAS optimization, customer journey analytics, conversion rate optimization" />

    <!-- ── PWA 필수 태그 ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d1829" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS PWA 최적화 ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GenieROI" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" />

    <!-- ── 파비콘 & 아이콘 ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="shortcut icon" href="/icon-192.png" />

    <!-- ── 모바일 CSS (PWA 최적화) ── -->
    <link rel="stylesheet" href="/mobile.css" />

    <!-- ── Microsoft ── -->
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-TileColor" content="#070f1a" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GeniegoROI — 마케팅 성과 분석 & 어트리뷰션" />
    <meta property="og:description" content="커머스 팀을 위한 마케팅 성과 분석, 멀티채널 어트리뷰션, ROAS 최적화 플랫폼." />
    <meta property="og:image" content="/icon-512.png" />
  </head>
  <body>
    <!-- ── 스플래시 스크린 (앱 로딩 시) ── -->
    <div id="pwa-splash">
      <img src="/icon-192.png" alt="Geniego ROI" />
      <div class="splash-title">Geniego-ROI</div>
      <div class="splash-sub" id="pwa-splash-sub">Marketing Analytics &amp; Attribution Platform</div>
    </div>

    <!-- ── 앱 루트 (React 앱이 이 안에 바텀 네비 포함 전부 렌더링) ── -->
    <div id="root"></div>

    <!-- ── PWA 설치 배너 (Android Chrome) ── -->
    <div id="pwa-install-banner" style="display:none">
      <img src="/icon-192.png" alt="app icon" />
      <div class="banner-text">
        <div class="banner-title" id="pwa-install-title">📲 Install App</div>
        <div class="banner-desc" id="pwa-install-desc">Add to Home Screen for App-like Use</div>
      </div>
      <button id="pwa-install-btn">Install</button>
      <button id="pwa-install-close" aria-label="Close">×</button>
    </div>

    <!-- ── iOS 설치 가이드 ── -->
    <div id="ios-install-guide" style="display:none">
      <div class="ios-guide-title" id="ios-guide-title">📱 Install App on iPhone</div>
      <div class="ios-guide-steps">
        <div class="ios-guide-step">
          <span class="ios-guide-step-icon">1️⃣</span>
          <span id="ios-step-1">Tap the <strong>Share Button (□↑)</strong> at the bottom of Safari</span>
        </div>
        <div class="ios-guide-step">
          <span class="ios-guide-step-icon">2️⃣</span>
          <span id="ios-step-2">Select <strong>"Add to Home Screen"</strong></span>
        </div>
        <div class="ios-guide-step">
          <span class="ios-guide-step-icon">3️⃣</span>
          <span id="ios-step-3">Tap <strong>"Add"</strong> to complete!</span>
        </div>
      </div>
      <button id="ios-install-close-btn">OK</button>
    </div>

    <!-- ── 메인 앱 스크립트 ── -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── PWA 초기화 스크립트 ── -->
    <script>
      (function() {
        // Translation logic
        const langCode = localStorage.getItem('genie_roi_lang') || navigator.language.substring(0,2) || 'en';
        const isKo = (langCode === 'ko');
        
        if (isKo) {
          const trySet = (id, text) => { const el = document.getElementById(id); if (el) el.innerHTML = text; };
          trySet('pwa-splash-sub', '마케팅 성과 분석 · 어트리뷰션 플랫폼');
          trySet('pwa-install-title', '📲 앱으로 설치하기');
          trySet('pwa-install-desc', '홈 화면에 추가하여 앱처럼 사용하세요');
          trySet('pwa-install-btn', '설치');
          trySet('ios-guide-title', '📱 iPhone에 앱 설치하기');
          trySet('ios-step-1', 'Safari 하단의 <strong>공유 버튼 (□↑)</strong>을 탭하세요');
          trySet('ios-step-2', '<strong>"홈 화면에 추가"</strong>를 선택하세요');
          trySet('ios-step-3', '<strong>"추가"</strong>를 탭하면 설치 완료!');
          trySet('ios-install-close-btn', '확인');
        }
      })();

      // ── 스플래시 스크린 숨기기 ──
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('pwa-splash');
          if (splash) splash.classList.add('hidden');
        }, 1800);
      });

      // ── Service Worker 등록 (네이티브 Capacitor 에서는 스킵 — 로컬 자산 직접 서빙, SW 충돌·stale 방지) ──
      var _isNativeApp = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
      if ('serviceWorker' in navigator && !_isNativeApp) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }

      // ── PWA 설치 프롬프트 (Android Chrome) ──
      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('pwa-install-banner');
        if (banner && !localStorage.getItem('pwa-install-dismissed')) {
          banner.style.display = 'flex';
        }
      });

      document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          document.getElementById('pwa-install-banner').style.display = 'none';
        }
        deferredPrompt = null;
      });

      document.getElementById('pwa-install-close')?.addEventListener('click', () => {
        document.getElementById('pwa-install-banner').style.display = 'none';
        localStorage.setItem('pwa-install-dismissed', '1');
      });

      // ── iOS 설치 가이드 ──
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;

      if (isIOS && !isStandalone && !localStorage.getItem('ios-guide-shown')) {
        setTimeout(() => {
          const guide = document.getElementById('ios-install-guide');
          if (guide) guide.style.display = 'block';
          localStorage.setItem('ios-guide-shown', '1');
        }, 4000);
      }

      document.getElementById('ios-install-close-btn')?.addEventListener('click', () => {
        document.getElementById('ios-install-guide').style.display = 'none';
      });

      // ── 앱 설치 완료 감지 ──
      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        const banner = document.getElementById('pwa-install-banner');
        if (banner) banner.style.display = 'none';
      });
    </script>
  </body>
</html>
