server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ★ 201차 P1: 보안 헤더 재현성(repo 정본). 운영 vhost(179차)와 동일 정책을 Docker 이미지에도 고정.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # SPA 는 인라인 스타일을 광범위하게 사용하므로 style-src 에 'unsafe-inline' 허용(미허용 시 화면 붕괴).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
