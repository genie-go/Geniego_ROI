<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeniegoROI — Marketing Automation Start Guide</title>
<style>
  :root { --bg:#f6f8fc; --card:#fff; --pri:#4f46e5; --pri2:#7c3aed; --txt:#1e293b; --sub:#64748b; --line:#e2e8f0; --ok:#16a34a; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--txt); line-height:1.7; }
  .wrap { max-width:860px; margin:0 auto; padding:24px 18px 80px; }
  header { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .brand { font-weight:900; font-size:18px; background:linear-gradient(135deg,var(--pri),var(--pri2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  select { padding:8px 12px; border-radius:10px; border:1px solid var(--line); background:#fff; font-size:14px; cursor:pointer; }
  h1 { font-size:26px; margin:14px 0 6px; }
  .lead { color:var(--sub); font-size:15px; margin-bottom:8px; }
  .safe { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25); border-radius:12px; padding:12px 16px; font-size:13.5px; color:#15803d; margin:14px 0 24px; }
  .step { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:16px; box-shadow:0 4px 16px rgba(15,23,42,0.04); display:flex; gap:16px; }
  .num { flex-shrink:0; width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--pri),var(--pri2)); color:#fff; font-weight:900; font-size:17px; display:flex; align-items:center; justify-content:center; }
  .step h3 { margin:2px 0 6px; font-size:16.5px; }
  .step p { margin:0; color:var(--sub); font-size:14px; }
  .step .path { display:inline-block; font-size:12px; font-weight:700; color:var(--pri); background:rgba(79,70,229,0.08); padding:4px 10px; border-radius:7px; }
  .step .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:10px; }
  .go { display:inline-block; font-size:12.5px; font-weight:800; color:#fff; text-decoration:none; background:linear-gradient(135deg,var(--pri),var(--pri2)); padding:6px 14px; border-radius:8px; box-shadow:0 3px 10px rgba(79,70,229,0.3); }
  .go:hover { opacity:.92; }
  /* 스텝퍼 */
  .prog { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 16px; margin-bottom:14px; }
  .prog-top { display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:var(--sub); margin-bottom:7px; }
  .prog-bar { height:8px; border-radius:8px; background:var(--line); overflow:hidden; }
  .prog-fill { height:100%; border-radius:8px; background:linear-gradient(90deg,var(--pri),var(--pri2)); transition:width .4s; }
  .step.done { opacity:.62; }
  .step.done .num { background:var(--ok); }
  .step.locked { opacity:.4; }
  .step.active { border-color:var(--pri); box-shadow:0 6px 22px rgba(79,70,229,0.14); }
  .nextb { font-size:12.5px; font-weight:800; color:#fff; border:none; cursor:pointer; background:var(--ok); padding:7px 16px; border-radius:8px; box-shadow:0 3px 10px rgba(22,163,74,0.3); }
  .prevb { font-size:12px; font-weight:700; color:var(--sub); border:1px solid var(--line); cursor:pointer; background:#fff; padding:6px 12px; border-radius:8px; }
  .donebadge { display:inline-block; font-size:12px; font-weight:800; color:var(--ok); background:rgba(22,163,74,0.1); padding:4px 10px; border-radius:7px; }
  .alldone { background:linear-gradient(135deg,rgba(22,163,74,0.1),rgba(79,70,229,0.08)); border:1px solid rgba(22,163,74,0.3); border-radius:16px; padding:20px 22px; font-size:15px; font-weight:700; color:#15803d; margin-bottom:16px; }
  .reset { font-size:12px; font-weight:700; color:var(--sub); border:1px solid var(--line); cursor:pointer; background:#fff; padding:6px 14px; border-radius:8px; margin-left:6px; }
  footer { text-align:center; color:var(--sub); font-size:12px; margin-top:28px; }
  .pill { display:inline-block; font-size:11px; font-weight:800; color:#fff; background:var(--pri2); border-radius:999px; padding:2px 10px; margin-left:6px; vertical-align:middle; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">⚡ GeniegoROI</div>
    <select id="lang" onchange="render(this.value)" aria-label="Language"></select>
  </header>
  <h1 id="title"></h1>
  <div class="lead" id="lead"></div>
  <div class="safe" id="safe"></div>
  <div id="steps"></div>
  <footer id="footer"></footer>
</div>

  vi:{ title:"Hướng dẫn bắt đầu Tự động hóa Marketing", lead:"Làm theo các bước sau, ai cũng có thể bắt đầu chạy quảng cáo thật.",

  ar:{ title:"دليل بدء أتمتة التسويق", lead:"اتبع هذه الخطوات بالترتيب ويمكن لأي شخص بدء تسويق إعلاني حقيقي.",

      ["التحقق من الاتصال","انقر [اختبار الاتصال] لكل قناة وتأكد من شارة ‏‘تم التحقق’ الخضراء. يتم التحقق عبر واجهة القناة الحقيقية.","مركز التكامل ← اختبار"],

      ["إنشاء إعلانات بالذكاء الاصطناعي","في استوديو الإبداع استخدم ‏‘التوليد الجماعي بالذكاء الاصطناعي’ — أدخل المنتج/الفئة لتوليد عدة نسخ إعلانية دفعة واحدة (صور وفيديو أيضًا).","أتمتة التسويق ← استوديو الإبداع"],
      ["إنشاء حملة","في أتمتة التسويق اختر الهدف (ROAS/تحويل/نمو) والميزانية والقنوات؛ يوصي الذكاء الاصطناعي بميزانية لكل قناة. تُنشأ الحملات موقوفة (تكلفة 0).","أتمتة التسويق"],

  es:{ title:"Guía de inicio de Automatización de Marketing", lead:"Sigue estos pasos en orden y cualquiera puede lanzar publicidad real.",

      ["Crear creatividades con IA","En el Creative Studio usa ‘Generación masiva con IA’ — introduce producto/categoría y genera varias variantes de copy a la vez (también imágenes y vídeo).","Automatización de Marketing → Creative Studio"],
      ["Crear una campaña","En Automatización de Marketing elige objetivo (ROAS/conversión/crecimiento), presupuesto y canales; la IA recomienda presupuesto por canal. Las campañas se crean en pausa (coste 0).","Automatización de Marketing"],
      ["Revisar y activar","Revisa la campaña y pulsa [Activar] para iniciar la entrega real. Se recomienda empezar con un presupuesto pequeño.","Automatización de Marketing → Activar"],

  fr:{ title:"Guide de démarrage de l’automatisation marketing", lead:"Suivez ces étapes dans l’ordre et tout le monde peut lancer de vraies campagnes.",
    safe:"🛡️ Sécurité : les campagnes sont créées EN PAUSE par défaut — aucun coût avant activation. Sans moyen de paiement, l’activation est bloquée, et vous pouvez « Tout arrêter en urgence » à tout moment.",

  hi:{ title:"मार्केटिंग ऑटोमेशन शुरुआती गाइड", lead:"इन चरणों का क्रम से पालन करें और कोई भी असली विज्ञापन मार्केटिंग शुरू कर सकता है।",

      ["विज्ञापन चैनल जोड़ें","इंटीग्रेशन हब में किसी चैनल कार्ड (Meta·Google·TikTok·Kakao…) पर [रजिस्टर] दबाएँ और API की/एक्सेस टोकन डालें। सहेजते ही प्रदर्शन संग्रह शुरू।","इंटीग्रेशन हब"],
      ["कनेक्शन सत्यापित करें","हर चैनल पर [कनेक्शन टेस्ट] दबाएँ और हरा ‘सत्यापित’ बैज देखें। असली चैनल API से जाँचा जाता है।","इंटीग्रेशन हब → टेस्ट"],
      ["भुगतान विधि जोड़ें","असली विज्ञापन चलाने हेतु विज्ञापन-व्यय कार्ड रजिस्टर करें। केवल आपकी मासिक बजट सीमा के भीतर ही शुल्क लगेगा।","वित्त → भुगतान विधियाँ"],
      ["AI से विज्ञापन क्रिएटिव बनाएँ","Creative Studio में ‘AI बैच जनरेशन’ का उपयोग करें — बस उत्पाद/श्रेणी डालें और एक साथ कई विज्ञापन कॉपी बनाएँ (छवि व वीडियो भी)।","मार्केटिंग ऑटोमेशन → Creative Studio"],
      ["अभियान बनाएँ","मार्केटिंग ऑटोमेशन में लक्ष्य (ROAS/रूपांतरण/वृद्धि), बजट व चैनल चुनें; AI प्रति-चैनल बजट सुझाता है। अभियान रुके हुए बनते हैं (लागत 0)।","मार्केटिंग ऑटोमेशन"],
      ["समीक्षा कर सक्रिय करें","अभियान की समीक्षा कर [सक्रिय करें] दबाएँ ताकि असली डिलीवरी शुरू हो। छोटे बजट से शुरू करने की सलाह है।","मार्केटिंग ऑटोमेशन → सक्रिय करें"],
      ["मापें व अनुकूलित करें","Creative Insights, रिपोर्ट व इन्क्रीमेंटैलिटी मॉडल में प्रति-क्रिएटिव ROAS·CTR देखें। AI बर्बादी का स्वतः पता लगाकर समायोजन सुझाता है।","प्रदर्शन व रिपोर्टिंग"]

var STATE = { cur: 0 };
try { var _sv = JSON.parse(localStorage.getItem('genie_guide_state')||'{}'); if (typeof _sv.cur==='number') STATE.cur=_sv.cur; } catch(e){}
function saveState(){ try { localStorage.setItem('genie_guide_state', JSON.stringify(STATE)); } catch(e){} }
function go(i, total){ STATE.cur = Math.max(0, Math.min(total, i)); saveState(); render(document.getElementById('lang').value); window.scrollTo({top:0,behavior:'smooth'}); }

function render(code){
  var d = T[code] || T.ko;
  document.documentElement.lang = code;
  document.documentElement.dir = RTL[code] ? 'rtl' : 'ltr';
  document.getElementById('title').textContent = d.title;
  document.getElementById('lead').textContent = d.lead;
  document.getElementById('safe').textContent = d.safe;
  document.getElementById('footer').textContent = d.footer;
  var nav = NAV[code] || NAV.en;
  var total = d.steps.length;
  var cur = Math.max(0, Math.min(total, STATE.cur));
  var pct = Math.round(cur / total * 100);
  var html = '';
  // 진행률 바
  html += '<div class="prog"><div class="prog-top"><span>'+nav.step+' '+Math.min(cur+1,total)+' '+nav.of+' '+total+'</span><span>'+pct+'%</span></div>'
        + '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  // 모든 단계 완료 배너
  if (cur >= total) {
    html += '<div class="alldone">'+nav.all+'<div style="margin-top:12px"><a class="go" href="/auto-marketing" target="_blank" rel="noopener">'+(GO[code]||GO.en)+'</a> '
          + '<button class="reset" onclick="go(0,'+total+')">'+nav.reset+'</button></div></div>';
  }
  for (var i=0;i<total;i++){
    var s = d.steps[i];
    var cls = i < cur ? 'step done' : (i === cur ? 'step active' : 'step locked');
    var numHtml = i < cur ? '✓' : (i+1);
    var actions = '';
    if (i === cur) {
      var link = STEP_LINKS[i] ? '<a class="go" href="'+STEP_LINKS[i]+'" target="_blank" rel="noopener">'+(GO[code]||GO.en)+'</a>' : '';
      var prev = i > 0 ? '<button class="prevb" onclick="go('+(i-1)+','+total+')">'+nav.prev+'</button>' : '';
      actions = '<div class="row">'+(s[2]?'<span class="path">📍 '+s[2]+'</span>':'')+link
              + '<button class="nextb" onclick="go('+(i+1)+','+total+')">'+nav.done+'</button>'+prev+'</div>';
    } else if (i < cur) {
      actions = '<div class="row"><span class="donebadge">✓ '+nav.doneBadge+'</span>'+(s[2]?'<span class="path">📍 '+s[2]+'</span>':'')+'</div>';
    }
    html += '<div class="'+cls+'"><div class="num">'+numHtml+'</div><div style="flex:1"><h3>'+s[0]+'</h3>'
          + (i===cur ? '<p>'+s[1]+'</p>' : '')+actions+'</div></div>';
  }
  document.getElementById('steps').innerHTML = html;
  try { localStorage.setItem('genie_guide_lang', code); } catch(e){}
}
(function init(){
  var sel = document.getElementById('lang');
  for (var i=0;i<LANGS.length;i++){ var o=document.createElement('option'); o.value=LANGS[i][0]; o.textContent=LANGS[i][1]; sel.appendChild(o); }
  var saved = 'ko';
  try { saved = localStorage.getItem('genie_guide_lang') || (navigator.language||'ko').slice(0,2); } catch(e){}
  if (!T[saved]) { saved = (saved==='zh') ? 'zh' : (T[saved]?saved:'ko'); }
  if (!T[saved]) saved='ko';
  sel.value = saved; render(saved);
})();
</script>
