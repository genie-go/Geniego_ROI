<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeniegoROI — Guides</title>
<style>
  :root { --bg:#f6f8fc; --card:#fff; --pri:#4f46e5; --pri2:#7c3aed; --txt:#1e293b; --sub:#64748b; --line:#e2e8f0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--txt); line-height:1.7; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 18px 80px; }
  header { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .brand { font-weight:900; font-size:18px; background:linear-gradient(135deg,var(--pri),var(--pri2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  select { padding:8px 12px; border-radius:10px; border:1px solid var(--line); background:#fff; font-size:14px; cursor:pointer; }
  h1 { font-size:25px; margin:14px 0 6px; }
  .lead { color:var(--sub); font-size:15px; margin-bottom:20px; }
  a.card { display:flex; gap:16px; align-items:center; text-decoration:none; color:inherit; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:14px; box-shadow:0 4px 16px rgba(15,23,42,0.04); transition:transform .15s, box-shadow .15s; }
  a.card:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(15,23,42,0.1); }
  .ic { flex-shrink:0; width:48px; height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; }
  .c-title { font-size:16.5px; font-weight:800; margin:0 0 3px; }
  .c-desc { font-size:13px; color:var(--sub); margin:0; }
  .arr { margin-left:auto; color:var(--pri); font-weight:900; font-size:20px; }
  footer { text-align:center; color:var(--sub); font-size:12px; margin-top:24px; }
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand">⚡ GeniegoROI</div><select id="lang" onchange="render(this.value)" aria-label="Language"></select></header>
  <h1 id="title"></h1>
  <div class="lead" id="lead"></div>
  <div id="cards"></div>
  <footer id="footer"></footer>
</div>

  de:{ title:"Anleitungen", lead:"Schritt-für-Schritt-Assistenten — der Reihe nach bis zur echten Ausführung.", g:[["Marketing-Automatisierung","Von Kanalanbindung bis Kampagnenaktivierung und Erfolgsmessung"],["Commerce-Betrieb","Produkte, Lager, Bestand, Kanäle, Bestellungen, Abrechnung und GuV"]], footer:"Jede Anleitung geht nach Abschluss zum nächsten Schritt und öffnet echte Bildschirme per Shortcut." },
  th:{ title:"คู่มือการใช้งาน", lead:"วิซาร์ดทีละขั้น — ทำตามลำดับจนเสร็จการใช้งานจริง", g:[["การตลาดอัตโนมัติ","ตั้งแต่เชื่อมช่องทางโฆษณาจนเปิดแคมเปญและวัดผล"],["การดำเนินงานคอมเมิร์ซ","สินค้า คลัง สต็อก ช่องทาง คำสั่งซื้อ การชำระ และกำไรขาดทุน"]], footer:"แต่ละคู่มือจะไปขั้นถัดไปเมื่อเสร็จ และเปิดหน้าจริงผ่านทางลัด" },

  ar:{ title:"أدلة الاستخدام", lead:"معالجات خطوة بخطوة — اتبعها بالترتيب حتى التنفيذ الفعلي.", g:[["أتمتة التسويق","من ربط قنوات الإعلان إلى تفعيل الحملات وقياس النتائج"],["تشغيل التجارة","المنتجات، المستودع، المخزون، القنوات، الطلبات، التسوية والأرباح/الخسائر"]], footer:"ينتقل كل دليل إلى الخطوة التالية عند الإتمام ويفتح الشاشات الفعلية عبر الاختصارات." },
  es:{ title:"Guías de uso", lead:"Asistentes paso a paso — síguelos en orden hasta la ejecución real.", g:[["Automatización de Marketing","De conectar canales a activar campañas y medir resultados"],["Operaciones de Comercio","Productos, almacén, inventario, canales, pedidos, liquidación y P&L"]], footer:"Cada guía avanza al siguiente paso al completarse y abre pantallas reales con accesos directos." },
  fr:{ title:"Guides d'utilisation", lead:"Assistants pas à pas — suivez-les dans l'ordre jusqu'à l'exécution réelle.", g:[["Automatisation Marketing","De la connexion des canaux à l'activation des campagnes et la mesure"],["Opérations Commerce","Produits, entrepôt, stock, canaux, commandes, règlement et P&L"]], footer:"Chaque guide passe à l'étape suivante une fois terminée et ouvre les écrans réels via des raccourcis." },
  hi:{ title:"उपयोग गाइड", lead:"चरण-दर-चरण विज़ार्ड — क्रम से पालन करें, वास्तविक निष्पादन तक।", g:[["मार्केटिंग ऑटोमेशन","विज्ञापन चैनल जोड़ने से अभियान सक्रियण व मापन तक"],["कॉमर्स ऑपरेशन","उत्पाद, गोदाम, स्टॉक, चैनल, ऑर्डर, निपटान व P&L"]], footer:"प्रत्येक गाइड पूर्ण होने पर अगले चरण पर जाती है और शॉर्टकट से वास्तविक स्क्रीन खोलती है।" },

  ru:{ title:"Руководства", lead:"Пошаговые мастера — следуйте по порядку до реального выполнения.", g:[["Автоматизация маркетинга","От подключения каналов до активации кампаний и измерения"],["Коммерческие операции","Товары, склад, остатки, каналы, заказы, сверка и P&L"]], footer:"Каждое руководство переходит к следующему шагу после завершения и открывает реальные экраны по ссылкам." }

function render(code){
  var d = T[code] || T.ko;
  document.documentElement.lang = code; document.documentElement.dir = RTL[code] ? 'rtl' : 'ltr';
  document.getElementById('title').textContent = d.title;
  document.getElementById('lead').textContent = d.lead;
  document.getElementById('footer').textContent = d.footer;
  var html = '';
  for (var i=0;i<GUIDES.length;i++){
    var g = GUIDES[i], t = d.g[i] || ['',''];
    html += '<a class="card" href="'+g.href+'"><div class="ic" style="background:'+g.bg+'">'+g.ic+'</div><div><p class="c-title">'+t[0]+'</p><p class="c-desc">'+t[1]+'</p></div><span class="arr">→</span></a>';
  }
  document.getElementById('cards').innerHTML = html;
  try { localStorage.setItem('genie_guide_lang', code); } catch(e){}
}
(function init(){
  var sel = document.getElementById('lang');
  for (var i=0;i<LANGS.length;i++){ var o=document.createElement('option'); o.value=LANGS[i][0]; o.textContent=LANGS[i][1]; sel.appendChild(o); }
  var saved = 'ko';
  try { saved = localStorage.getItem('genie_guide_lang') || (navigator.language||'ko').slice(0,2); } catch(e){}
  if (!T[saved]) saved='ko';
  sel.value = saved; render(saved);
})();
</script>
</body>
</html>
