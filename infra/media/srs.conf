# GeniegoROI 라이브커머스 — SRS 5 미디어서버 설정 (WHIP/WHEP WebRTC)
# 참고: https://ossrs.io/lts/en-us/docs/v5/doc/webrtc
#
# 호스트 라이브커머스(WHIP 송출) / 시청자(WHEP 재생)를 위한 최소 설정.
#   - WHIP 발행: POST http(s)://<host>/rtc/v1/whip/?app=live&stream=<name>
#   - WHEP 재생: POST http(s)://<host>/rtc/v1/whep/?app=live&stream=<name>
# GeniegoROI 연동허브 등록값: provider=srs, base_url=https://<your-domain>
#   → WHIP/WHEP 경로는 플랫폼이 자동 조립(/rtc/v1/whip/·/rtc/v1/whep/).

listen              1935;          # RTMP (멀티송출 relay 수신용·선택)
max_connections     2000;
daemon              off;           # 컨테이너 foreground
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;          # WHIP/WHEP·HTTP API
    crossdomain     on;            # 브라우저 CORS(OPTIONS) 허용 — 헬스체크/발행 필수
}

http_server {
    enabled         on;
    listen          8080;          # HTTP-FLV/HLS(폴백 재생)·정적
    crossdomain     on;
}

rtc_server {
    enabled         on;
    listen          8000;          # WebRTC UDP(미디어). 방화벽 UDP/8000 개방 필수.
    # ★ candidate = 호스트의 공인 IP(또는 도메인). NAT/클라우드면 반드시 공인 IP.
    #   docker-compose 가 환경변수 $CANDIDATE 를 주입한다(기본 127.0.0.1=로컬테스트용).
    candidate       $CANDIDATE;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtmp_to_rtc on;            # RTMP 입력 → WebRTC 재생(멀티송출 호환)
        rtc_to_rtmp on;            # WebRTC 입력 → RTMP(녹화/relay 호환)
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;   # HTTP-FLV 폴백
    }
    play {
        gop_cache       on;
    }
}
