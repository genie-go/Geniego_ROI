services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: genie
      POSTGRES_PASSWORD: genie
      POSTGRES_DB: genie
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://genie:genie@db:5432/genie
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret
      PUBLIC_BASE_URL: http://localhost:8000
      DRY_RUN_CONNECTORS: "true"
    depends_on: [db, redis]
    ports: ["8000:8000"]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg2://genie:genie@db:5432/genie
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret
      DRY_RUN_CONNECTORS: "true"
    depends_on: [api, redis]
