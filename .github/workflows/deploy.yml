name: GENIE-GO ROI TITAN SUPREME V10

on:
  push:
    branches: [ master ] # 메인 브랜치 푸시 시 자동 실행
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.claude/**'
      - '.gitignore'
      - 'tools/**'
      - '.githooks/**'

env:
  HAS_SSH_SECRETS: ${{ secrets.REMOTE_IP != '' && secrets.REMOTE_USER != '' && secrets.SSH_PRIVATE_KEY != '' }}
  HAS_TEST_SECRETS: ${{ secrets.TEST_EMAIL != '' && secrets.TEST_PASS != '' }}
  HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

jobs:
  # 165차: frontend/backend 변경 감지 — 무관한 job skip
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'
              - 'inject_journey_ko.cjs'
            backend:
              - 'backend/**'

  deploy:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: "[PHASE 1] Syntax Guard & I18N Patch"
        run: |
          # en.js 구문 검증
            node -e "require('fs').readFileSync('./frontend/src/i18n/locales/en.js', 'utf8'); console.log('[OK] EN_JS_EXISTS');"

      - name: "[PHASE 2] Production Build"
        run: |
          cd frontend
          npm install
          npm run build --silent

      - name: "[PHASE 3] Secure Deploy (SFTP)"
        if: ${{ env.HAS_SSH_SECRETS == 'true' }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/home/wwwroot/roi.geniego.com/frontend"

      - name: "[PHASE 4] Post-Deploy Infrastructure Refresh"
        if: ${{ env.HAS_SSH_SECRETS == 'true' }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R www:www /home/wwwroot/roi.geniego.com
            /usr/local/nginx/sbin/nginx -s reload

      - name: "[PHASE 5] Health Check & Rollback"
        if: ${{ env.HAS_TEST_SECRETS == 'true' }}
        run: |
          # 5초 대기 후 로그인 API 검증
          sleep 5
          RESPONSE=$(curl -sk -X POST "https://roi.genie-go.com/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ secrets.TEST_EMAIL }}\",\"password\":\"${{ secrets.TEST_PASS }}\"}")
          if [[ $RESPONSE != *"token"* ]]; then
            echo "Login Failure! Initiating Rollback..."
            exit 1 # 실패 시 워크플로우 중단 및 알림
          fi

      - name: Slack Notification
        if: ${{ always() && env.HAS_SLACK_WEBHOOK == 'true' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 165차 신규: backend 자동 배포 — backend/** 변경 시 SCP + composer install + migration 자동 실행
  # 보존 디렉토리(운영 호스트에 이미 존재 → tar exclude): backend/.env, backend/vendor, backend/data, backend/logs
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: "[BACKEND P1] Package backend (보존 디렉토리 제외)"
        run: |
          tar -czf backend.tgz \
            --exclude='backend/.env' \
            --exclude='backend/vendor' \
            --exclude='backend/data' \
            --exclude='backend/logs' \
            --exclude='backend/composer.lock.bak' \
            --exclude='backend/*.sqlite' \
            backend/
          ls -lh backend.tgz

      - name: "[BACKEND P2] SCP tarball to remote /tmp"
        if: ${{ env.HAS_SSH_SECRETS == 'true' }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend.tgz"
          target: "/tmp/"

      - name: "[BACKEND P3] Pre-backup + Extract + composer install + migrate (운영 PHP 8.1+)"
        if: ${{ env.HAS_SSH_SECRETS == 'true' }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # ── P3.0 자동 백업 (mysqldump, 운영 호스트 .my.cnf.bak credentials) ──
            # 166차: GitHub secrets 미사용 결정 → 운영 호스트 .my.cnf.bak (chmod 600) 방식
            # 사전 설치 필요: /home/wwwroot/roi.geniego.com/backend/.my.cnf.bak
            #   [client]
            #   host = localhost
            #   user = root
            #   password = <비밀번호>
            CNF=/home/wwwroot/roi.geniego.com/backend/.my.cnf.bak
            if [ ! -f "$CNF" ]; then
              echo "[FAIL] $CNF 미존재 — 운영 호스트 mysqldump credentials 1회 설치 필요"
              echo "  설치: cat > \$CNF <<'EOF' / [client] / host=localhost / user=root / password=<...> / EOF"
              echo "  권한: chmod 600 \$CNF"
              exit 1
            fi
            TS=$(date +%Y%m%d_%H%M%S)
            mysqldump --defaults-file=$CNF \
              --single-transaction --routines --triggers --events \
              --default-character-set=utf8mb4 geniego_roi \
              | gzip > /tmp/backup_geniego_roi_pre_deploy_${TS}.sql.gz
            mysqldump --defaults-file=$CNF \
              --single-transaction --routines --triggers --events \
              --default-character-set=utf8mb4 geniego_roi_demo \
              | gzip > /tmp/backup_geniego_roi_demo_pre_deploy_${TS}.sql.gz
            gunzip -t /tmp/backup_*_pre_deploy_${TS}.sql.gz
            echo "[OK] Backup ${TS}: $(ls -lh /tmp/backup_*_pre_deploy_${TS}.sql.gz | awk '{print $5, $9}')"

            # ── P3.1 extract — tar exclude로 .env/vendor/data/logs는 덮어쓰기 X (보존) ──
            tar -xzf /tmp/backend.tgz -C /home/wwwroot/roi.geniego.com/
            chown -R www:www /home/wwwroot/roi.geniego.com/backend
            cd /home/wwwroot/roi.geniego.com/backend

            # ── P3.2 vendor 생성/갱신 — 운영 PHP 환경에서 install (ABI 안전) ──
            php composer.phar install --no-dev --optimize-autoloader --no-interaction

            # ── P3.3 migration plan log (dry-run) + 실 적용 (both, idempotent) ──
            echo "=== Migration plan (dry-run) ==="
            php bin/migrate.php both --dry-run
            echo "=== Migration apply ==="
            php bin/migrate.php both

            # ── P3.4 PHP-FPM reload — opcache 클리어, 시스템에 따라 fallback ──
            (systemctl reload php-fpm 2>/dev/null \
              || systemctl reload php8.1-fpm 2>/dev/null \
              || systemctl reload php8.2-fpm 2>/dev/null \
              || /usr/local/nginx/sbin/nginx -s reload) || true

            # ── cleanup ──
            rm -f /tmp/backend.tgz

      - name: "[BACKEND P4] Health check (root /)"
        if: ${{ env.HAS_SSH_SECRETS == 'true' }}
        run: |
          sleep 5
          HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://roi.genie-go.com/")
          if [[ "$HTTP" != "200" ]]; then
            echo "[FAIL] Backend health check: HTTP $HTTP"
            exit 1
          fi
          echo "[OK] Backend root health: HTTP $HTTP"

      - name: Slack Notification (backend)
        if: ${{ always() && env.HAS_SLACK_WEBHOOK == 'true' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
