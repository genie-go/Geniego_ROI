name: "Security Scan (deps + CodeQL)"

# [283차] 의존성/취약점 스캔 CI 신설.
#   부재증명: .github/workflows/ 에 deploy.yml 1개뿐 · codeql|dependabot|npm audit|composer audit|snyk|trivy → 0건.
#   → 프론트(npm)·백엔드(composer) 의존성 CVE 와 JS 코드 취약점이 어떤 게이트도 통과하지 않고 배포돼 왔다.
#
# ★설계 원칙 — 기존 배포 파이프라인 무간섭:
#   1) deploy.yml 은 절대 건드리지 않는다(master push = 운영 배포 트리거).
#   2) 본 워크플로는 PR·스케줄·수동(workflow_dispatch) 에서만 돈다. `push: master` 트리거 없음
#      → 이 파일이 배포를 유발하거나 막는 일이 구조적으로 불가능하다.
#   3) 초기 도입기엔 리포트 전용(continue-on-error: true) — 기존 취약점 백로그가 PR 을 즉시 막지 않도록.
#      백로그 정리 후 `continue-on-error` 를 제거하면 그대로 차단 게이트로 승격된다(운영 전환점 주석 표기).
#
# ★CodeQL 언어 범위(실측 확인):
#   CodeQL 지원 = C/C++, C#, Go, Java/Kotlin, JavaScript/TypeScript, Python, Ruby, Swift, GitHub Actions.
#   **PHP 는 CodeQL 미지원** → 백엔드는 CodeQL 대신 `composer audit`(Packagist 보안권고 DB) 로 커버한다.
#   PHP 정적분석을 추측으로 선구현하지 않는다(미지원 언어를 매트릭스에 넣으면 잡이 상시 실패).

#
# [289차 ④] `repo-guards` 잡 추가 — B4(자격증명) + G15(인가 회귀)를 CI 에서도 실행.
#   근거: pre-commit 은 `core.hooksPath`(**클론별 로컬 config**)에 의존하고 `--no-verify` 로 우회된다
#         → 새 클론·CI runner 에선 **아무 가드도 안 돈다**(1-6 G-06 · 5-8 GUARD-GAP-02 · G-05b).
#   ★정직한 한계(과대주장 금지): 아래 잡은 **탐지(detection)이지 예방(prevention)이 아니다.**
#     이 저장소엔 브랜치 보호·필수체크가 없고 deploy.yml 은 master push 시 **독립적으로** 돈다.
#     → master 직push 시 이 잡의 실패는 배포를 **막지 못하고 사후 통보**만 한다.
#     진짜 차단은 **브랜치 보호 + required check 설정**(GitHub 저장소 설정 · 사용자 결정사항)이 있어야 성립한다.
#     "CI 가드가 있으니 안전하다"고 읽지 말 것 — 275차 guard_headerless_getjson 이 정확히 그 오독으로 4층을 오염시켰다.
on:
  # [289차 ④] push 트리거 추가 — 이 저장소는 PR 없이 브랜치에 직접 push 하는 흐름이라
  #   pull_request 트리거만으로는 repo-guards 가 **영원히 안 돈다**(고아 가드 재현).
  #   ※ 배포 무간섭 불변식은 유지된다: 배포는 deploy.yml 이 독립 트리거로 수행하며,
  #     본 워크플로는 그 파일을 건드리지 않고 배포를 유발·차단하지도 않는다.
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # 매주 월요일 03:17 UTC — 신규 CVE 공시분을 코드 변경이 없어도 주기적으로 재평가.
    - cron: '17 3 * * 1'
  workflow_dispatch:

# 최소 권한 원칙. CodeQL 결과 업로드에 security-events: write 필요.
permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── [289차 ④] 저장소 자체 가드 — pre-commit 이 로컬 opt-in 이라 CI 에서도 실행 ────────────
  #   ★차단 게이트다(continue-on-error 없음). 283차 의존성 스캔이 리포트 전용인 것과 의도적으로 다르다:
  #     - 의존성 CVE = **기존 백로그**가 있어 즉시 차단하면 모든 PR 이 막힌다 → 리포트 전용이 옳다.
  #     - 아래 두 가드 = **현행 위반 0 실측 확인** → 차단해도 기존 흐름 무영향이고,
  #       리포트 전용으로 두면 "가드가 있는데 아무것도 막지 않는" 275차 사고를 CI 에서 재현하게 된다.
  repo-guards:
    name: "repo guards (secrets B4 · authz G15)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # B4 는 커밋 범위 diff 를 본다 → 얕은 클론이면 base 커밋이 없어 검사 범위가 무너진다.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # B4 — 자격증명 형태 차단. 규칙 SSOT = tools/scan_secrets.sh (pre-commit 과 **같은 스크립트**).
      #   정규식을 이 파일에 복사하면 규칙이 두 벌로 갈라져 따로 낡는다(289차 ② '351 5벌'과 같은 클래스).
      - name: "B4 — secret-shaped lines (staged rule SSOT)"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push: before 는 브랜치 첫 push 시 all-zero → 스크립트가 HEAD^ 폴백으로 처리한다.
            BASE="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          bash tools/scan_secrets.sh --range "$BASE" "$HEAD_SHA"

      # G15 — 헤더리스 getJson 인가 회귀(275차 클래스). 289차에 pre-commit 배선 → CI 로 승격.
      #   전체 트리를 스캔하므로 diff 범위와 무관하게 항상 유효하다.
      - name: "G15 — headerless getJson authz regression"
        run: node tools/guard_headerless_getjson.mjs

  # ── 프론트엔드 의존성 CVE (npm audit) — 루트 + frontend/ 양쪽 lockfile ──────────────
  npm-audit:
    name: "npm audit (frontend deps)"
    runs-on: ubuntu-latest
    # [289차 ④] push 트리거는 repo-guards 전용으로 추가한 것 — 의존성 스캔의 실행 조건은 283차 그대로 유지한다
    #   (매 push 마다 audit/CodeQL 을 돌리면 283차 설계·CI 사용량이 바뀐다. 트리거는 워크플로 단위이므로 잡에서 제한).
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # npm audit 는 lockfile 만 있으면 install 없이 동작(설치 시간·공급망 노출 최소화).
      - name: "npm audit — repo root"
        continue-on-error: true   # [283차] 리포트 전용. 백로그 정리 후 제거 → 차단 게이트로 승격.
        run: npm audit --audit-level=high

      - name: "npm audit — frontend/"
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

      # 사람이 읽을 요약을 Actions 잡 서머리에 남긴다(실패해도 파이프라인 무영향).
      - name: "Summary"
        if: always()
        continue-on-error: true
        run: |
          {
            echo "## npm audit 요약"
            echo '```'
            npm audit --audit-level=high 2>&1 | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 백엔드 의존성 CVE (composer audit) — CodeQL 이 PHP 를 지원하지 않아 이 잡이 PHP 측 커버리지 ──
  composer-audit:
    name: "composer audit (backend deps)"
    runs-on: ubuntu-latest
    if: github.event_name != 'push'   # [289차 ④] 283차 실행 조건 보존(위 npm-audit 주석 참조).
    steps:
      - uses: actions/checkout@v4

      - name: "Setup PHP 8.1"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'   # 운영 호스트(PHP 8.1.34)와 정합.
          tools: composer:v2
          coverage: none

      # composer.lock 기준 Packagist 보안권고 대조. install 불필요.
      - name: "composer audit"
        continue-on-error: true   # [283차] 리포트 전용.
        working-directory: backend
        run: composer audit --no-interaction --locked

  # ── JS/TS 정적 코드 취약점 (CodeQL). PHP 는 미지원이라 매트릭스에서 의도적으로 제외 ──────
  codeql:
    name: "CodeQL (javascript-typescript)"
    runs-on: ubuntu-latest
    if: github.event_name != 'push'   # [289차 ④] 283차 실행 조건 보존(위 npm-audit 주석 참조).
    steps:
      - uses: actions/checkout@v4

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          # clean_src = 읽기전용 히스토리 미러(.clineignore), dist/node_modules = 빌드산출물·의존성,
          #   backend/public/assets = 배포된 번들 사본 → 스캔 시 실코드가 아닌 노이즈만 대량 생성된다.
          #   루트의 일회성 패치 스크립트(fix_*/patch_*/_*.cjs)도 이미 실행 완료된 역사적 산물이라 제외.
          config: |
            paths-ignore:
              - clean_src
              - backup
              - '**/dist'
              - '**/node_modules'
              - 'backend/public/assets'
              - 'frontend/src/i18n/locales'

      # 빌드 없이 소스 스캔(JS 는 컴파일 불요). vite build 를 돌리지 않으므로 배포 산출물에 무영향.
      - name: "Perform CodeQL Analysis"
        continue-on-error: true   # [283차] 리포트 전용. 결과는 Security 탭(code scanning alerts)에 적재된다.
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
