<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <title>GENIE V253 — AdOps OS</title>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold">GENIE AdOps OS <span class="text-slate-500 font-normal">V253</span></h1>
        <p class="text-sm text-slate-600 mt-1">실시간 운영 대시보드 • KPI → 예산 → 실행 → 보고서 자동화</p>
      </div>
      <div class="flex gap-2">
        <button id="btnRun" class="px-4 py-2 rounded-xl bg-black text-white text-sm">자동 파이프라인 실행</button>
        <a href="/docs" class="px-4 py-2 rounded-xl bg-white border text-sm">API Docs</a>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-6">
      <div class="bg-white rounded-2xl shadow p-4">
        <div class="flex items-center justify-between">
          <div class="font-semibold">상태</div>
          <span id="pill" class="text-xs px-2 py-1 rounded-full bg-slate-100 text-slate-700">연결중…</span>
        </div>
        <div class="mt-3 space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-slate-600">Tenant</span><span id="tenant" class="font-mono">demo</span></div>
          <div class="flex justify-between"><span class="text-slate-600">Role</span><span id="role" class="font-mono">admin</span></div>
          <div class="flex justify-between"><span class="text-slate-600">AUTO_EXECUTE</span><span id="autoExec" class="font-mono">-</span></div>
          <div class="flex justify-between"><span class="text-slate-600">DRY_RUN</span><span id="dryRun" class="font-mono">-</span></div>
        </div>

        <div class="mt-4">
          <div class="text-xs text-slate-500 mb-2">최근 이벤트</div>
          <div id="events" class="text-xs font-mono bg-slate-50 border rounded-xl p-2 h-36 overflow-auto"></div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow p-4 lg:col-span-2">
        <div class="flex items-center justify-between">
          <div class="font-semibold">KPI 실시간 요약</div>
          <button id="btnRefresh" class="text-sm px-3 py-1.5 rounded-xl border bg-white">새로고침</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mt-3">
          <div class="rounded-2xl bg-slate-50 border p-3">
            <div class="text-xs text-slate-500">Spend</div>
            <div id="kSpend" class="text-xl font-semibold">-</div>
          </div>
          <div class="rounded-2xl bg-slate-50 border p-3">
            <div class="text-xs text-slate-500">Revenue</div>
            <div id="kRev" class="text-xl font-semibold">-</div>
          </div>
          <div class="rounded-2xl bg-slate-50 border p-3">
            <div class="text-xs text-slate-500">ROAS</div>
            <div id="kRoas" class="text-xl font-semibold">-</div>
          </div>
          <div class="rounded-2xl bg-slate-50 border p-3">
            <div class="text-xs text-slate-500">Approvals (7d)</div>
            <div id="kAppr" class="text-xl font-semibold">-</div>
          </div>
        </div>
        <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="border rounded-2xl p-3 bg-white">
            <div class="text-sm font-semibold mb-2">ROAS Trend</div>
            <canvas id="roasChart" height="140"></canvas>
          </div>
          <div class="border rounded-2xl p-3 bg-white">
            <div class="text-sm font-semibold mb-2">Spend Trend</div>
            <canvas id="spendChart" height="140"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4">
      <div class="bg-white rounded-2xl shadow p-4">
        <div class="flex items-center justify-between">
          <div class="font-semibold">자동 생성 보고서</div>
          <button id="btnOpenReport" class="text-sm px-3 py-1.5 rounded-xl bg-black text-white">최신 보고서 열기</button>
        </div>
        <div class="text-sm text-slate-600 mt-2">
          파이프라인 실행 시 KPI/예측/추천/승인/실행상태를 요약한 HTML 보고서가 생성됩니다.
        </div>
        <div id="reportMeta" class="mt-3 text-xs font-mono bg-slate-50 border rounded-xl p-2">-</div>
      </div>

      <div class="bg-white rounded-2xl shadow p-4">
        <div class="flex items-center justify-between">
          <div class="font-semibold">글로벌 가격 전략 시뮬레이션</div>
          <button id="btnSim" class="text-sm px-3 py-1.5 rounded-xl border bg-white">시뮬레이션</button>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-3 text-sm">
          <label class="text-slate-600">기본 ARPA(월)</label><input id="arpa" class="border rounded-xl px-3 py-2" value="399"/>
          <label class="text-slate-600">월 이탈률</label><input id="churn" class="border rounded-xl px-3 py-2" value="0.03"/>
          <label class="text-slate-600">CAC</label><input id="cac" class="border rounded-xl px-3 py-2" value="1200"/>
          <label class="text-slate-600">NRR</label><input id="nrr" class="border rounded-xl px-3 py-2" value="1.15"/>
          <label class="text-slate-600">고객수(초기)</label><input id="customers" class="border rounded-xl px-3 py-2" value="50"/>
          <label class="text-slate-600">기간(월)</label><input id="months" class="border rounded-xl px-3 py-2" value="24"/>
        </div>
        <div class="mt-3">
          <div class="text-xs text-slate-500 mb-2">결과</div>
          <div id="simOut" class="text-xs font-mono bg-slate-50 border rounded-xl p-2 h-40 overflow-auto">-</div>
        </div>
      </div>
    </div>
  </div>

<script>
const headers = {
  "X-Tenant-Id": localStorage.getItem("tenant") || "demo",
  "X-Role": localStorage.getItem("role") || "admin",
  "Content-Type": "application/json",
};
document.getElementById("tenant").textContent = headers["X-Tenant-Id"];
document.getElementById("role").textContent = headers["X-Role"];

let roasChart, spendChart;

function appendEvent(line) {
  const el = document.getElementById("events");
  el.textContent = (line + "\n") + el.textContent;
}

async function refreshSummary() {
  const r = await fetch("/v253/metrics/summary", {headers});
  const j = await r.json();
  document.getElementById("autoExec").textContent = j.runtime.AUTO_EXECUTE;
  document.getElementById("dryRun").textContent = j.runtime.DRY_RUN;
  document.getElementById("kSpend").textContent = j.kpi.spend.toFixed(0);
  document.getElementById("kRev").textContent = j.kpi.revenue.toFixed(0);
  document.getElementById("kRoas").textContent = j.kpi.roas.toFixed(2);
  document.getElementById("kAppr").textContent = j.kpi.approvals_7d;

  const labels = j.trends.days;
  const roas = j.trends.roas;
  const spend = j.trends.spend;

  if (!roasChart) {
    roasChart = new Chart(document.getElementById("roasChart"), {
      type: "line",
      data: { labels, datasets: [{ label: "ROAS", data: roas }] },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
    spendChart = new Chart(document.getElementById("spendChart"), {
      type: "line",
      data: { labels, datasets: [{ label: "Spend", data: spend }] },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  } else {
    roasChart.data.labels = labels; roasChart.data.datasets[0].data = roas; roasChart.update();
    spendChart.data.labels = labels; spendChart.data.datasets[0].data = spend; spendChart.update();
  }

  const rep = await (await fetch("/v253/reports/latest", {headers})).json();
  document.getElementById("reportMeta").textContent = JSON.stringify(rep, null, 2);
}

function connectSSE() {
  const pill = document.getElementById("pill");
  const url = "/v253/stream/events?tenant_id=" + encodeURIComponent(headers["X-Tenant-Id"]);
  const es = new EventSource(url);
  es.onopen = () => { pill.textContent = "실시간 연결"; pill.className = "text-xs px-2 py-1 rounded-full bg-emerald-50 text-emerald-700"; };
  es.onerror = () => { pill.textContent = "연결 오류"; pill.className = "text-xs px-2 py-1 rounded-full bg-rose-50 text-rose-700"; };
  es.onmessage = (e) => { appendEvent(e.data); };
}

document.getElementById("btnRefresh").onclick = refreshSummary;

document.getElementById("btnRun").onclick = async () => {
  appendEvent("▶ Pipeline start");
  const r = await fetch("/v253/workflows/run", {method:"POST", headers, body: JSON.stringify({})});
  const j = await r.json();
  appendEvent("✔ Pipeline done: " + (j.report_id || "no-report"));
  await refreshSummary();
};

document.getElementById("btnOpenReport").onclick = async () => {
  const rep = await (await fetch("/v253/reports/latest", {headers})).json();
  if (rep && rep.report_id) window.open("/v253/reports/" + rep.report_id, "_blank");
  else alert("보고서가 아직 없습니다. 먼저 파이프라인을 실행하세요.");
};

document.getElementById("btnSim").onclick = async () => {
  const body = {
    arpa: parseFloat(document.getElementById("arpa").value),
    monthly_churn: parseFloat(document.getElementById("churn").value),
    cac: parseFloat(document.getElementById("cac").value),
    nrr: parseFloat(document.getElementById("nrr").value),
    customers0: parseInt(document.getElementById("customers").value),
    months: parseInt(document.getElementById("months").value),
  };
  const r = await fetch("/v253/pricing/simulate", {method:"POST", headers, body: JSON.stringify(body)});
  const j = await r.json();
  document.getElementById("simOut").textContent = JSON.stringify(j, null, 2);
};

refreshSummary();
connectSSE();
</script>
</body>
</html>
