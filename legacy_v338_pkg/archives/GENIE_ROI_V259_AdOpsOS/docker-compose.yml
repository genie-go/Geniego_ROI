
version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: genie_roi
      POSTGRES_USER: genie
      POSTGRES_PASSWORD: genie
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  ai:
    build: ./services/ai
    ports: ["8000:8000"]

  connectors:
    build: ./services/connectors
    ports: ["3000:3000"]

  gateway:
    build: ./services/gateway
    ports: ["8080:8080"]
    depends_on:
      - postgres
      - redis
      - ai
      - connectors
