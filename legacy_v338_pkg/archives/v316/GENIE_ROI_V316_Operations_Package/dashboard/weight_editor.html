<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>V316 가중치 편집기</title>
<style>
  body{font-family:system-ui;margin:18px}
  textarea{width:100%;height:360px;font-family:ui-monospace,Menlo,Consolas,monospace}
  button{padding:8px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer}
  small{color:#666}
</style></head>
<body>
<h1>V316 가중치(Weights) 편집기</h1>
<p><small>이 화면은 JSON을 복사/붙여넣기 편하게 만든 도구입니다. 실제 적용은 templates/v316/weights.json 파일을 수정하세요.</small></p>
<textarea id="t"></textarea>
<div style="display:flex;gap:8px;align-items:center;margin-top:10px">
  <button onclick="copyText()">복사</button>
  <button onclick="loadSample()">샘플 불러오기</button>
  <span id="msg"><small></small></span>
</div>
<script>
async function loadSample(){
  const r = await fetch('/templates/v316/weights.json', {cache:'no-store'});
  document.getElementById('t').value = await r.text();
}
function copyText(){
  const t=document.getElementById('t'); t.select(); document.execCommand('copy');
  document.getElementById('msg').innerHTML='<small>클립보드에 복사했습니다.</small>';
}
loadSample();
</script>
</body></html>
