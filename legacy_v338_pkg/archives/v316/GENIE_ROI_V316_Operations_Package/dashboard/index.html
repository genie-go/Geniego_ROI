<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GENIE_ROI V316 로컬 대시보드</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:18px;line-height:1.45}
    .row{display:flex;flex-wrap:wrap;gap:12px}
    .card{border:1px solid #ddd;border-radius:12px;padding:12px;min-width:220px;flex:1}
    .kpi{font-size:22px;font-weight:700}
    .muted{color:#666}
    table{border-collapse:collapse;width:100%}
    th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;font-size:14px}
    th{background:#fafafa}
    .small{font-size:12px}
    .pill{display:inline-block;border:1px solid #ddd;border-radius:999px;padding:2px 8px;font-size:12px;color:#333}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:1000px){.grid{grid-template-columns:1fr 1fr}}
    .chart{width:100%;height:180px;border:1px solid #eee;border-radius:12px;overflow:hidden}
  </style>
</head>
<body>
  <h1>GENIE_ROI V316 로컬 대시보드</h1>
  <p class="muted">데이터: <span class="pill">/out/dashboard_ads_kpi.json</span> · (선택) <span class="pill">/out/dashboard_influencer_kpi.json</span></p>
  <div id="alerts" class="small muted"></div>

  <h2>광고 KPI</h2>
  <div class="row" id="kpiCards"></div>

  <div class="grid">
    <div class="card">
      <h3>일별 ROAS 트렌드</h3>
      <svg id="roasChart" class="chart" viewBox="0 0 800 180" preserveAspectRatio="none"></svg>
      <div class="small muted">오프라인 동작(순수 SVG)</div>
    </div>
    <div class="card">
      <h3>캠페인 Top 10 (ROAS)</h3>
      <div style="overflow:auto;max-height:280px">
        <table id="topCampaigns">
          <thead><tr><th>채널</th><th>캠페인</th><th>ROAS</th><th>비용</th><th>매출</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <h2 style="margin-top:26px">인플루언서 Risk/Fit</h2>
  <div class="row" id="inflKpiCards"></div>
  <div class="card">
    <h3>인플루언서 점수</h3>
    <div style="overflow:auto;max-height:320px">
      <table id="inflTable">
        <thead><tr><th>인플루언서</th><th>Total</th><th>Fit</th><th>Risk</th><th>Performance</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="small muted">인플루언서 JSON이 없으면 비어 있을 수 있습니다.</div>
  </div>

<script>
function fmt(n){
  if(n===null||n===undefined||Number.isNaN(n)) return "-";
  const x = Number(n);
  if(Math.abs(x) >= 1e8) return (x/1e8).toFixed(2)+"억";
  if(Math.abs(x) >= 1e4) return (x/1e4).toFixed(1)+"만";
  return x.toLocaleString();
}
async function loadJson(url){
  const r = await fetch(url, {cache:"no-store"});
  if(!r.ok) throw new Error(url+" HTTP "+r.status);
  return await r.json();
}
function card(title, value, sub){
  const d = document.createElement("div");
  d.className = "card";
  d.innerHTML = `<div class="muted small">${title}</div><div class="kpi">${value}</div><div class="muted small">${sub||""}</div>`;
  return d;
}
function drawLine(svg, ys){
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  const w=800,h=180,pad=24;
  const max = Math.max(...ys, 0.00001);
  const min = Math.min(...ys, 0);
  const step = (w-2*pad)/Math.max(ys.length-1,1);
  const yMap = (v)=>{
    const denom = (max-min)||1;
    return h-pad - ((v-min)/denom)*(h-2*pad);
  };
  const axis = document.createElementNS("http://www.w3.org/2000/svg","line");
  axis.setAttribute("x1",pad); axis.setAttribute("y1",h-pad);
  axis.setAttribute("x2",w-pad); axis.setAttribute("y2",h-pad);
  axis.setAttribute("stroke","#ddd"); svg.appendChild(axis);

  let d="";
  ys.forEach((v,i)=>{
    const x = pad + i*step;
    const y = yMap(v);
    d += (i===0?"M":" L")+x+" "+y;
  });
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",d); path.setAttribute("fill","none");
  path.setAttribute("stroke","#111"); path.setAttribute("stroke-width","2");
  svg.appendChild(path);
}
(async ()=>{
  const alerts=document.getElementById("alerts");
  try{
    const ads = await loadJson("/out/dashboard_ads_kpi.json");
    const cards=document.getElementById("kpiCards");
    cards.appendChild(card("총 광고비", fmt(ads.summary.total_cost), `기간: ${ads.summary.date_from} ~ ${ads.summary.date_to}`));
    cards.appendChild(card("총 매출", fmt(ads.summary.total_revenue), "귀속된 매출 합계"));
    cards.appendChild(card("ROAS", (ads.summary.roas||0).toFixed(2), "매출/광고비"));
    cards.appendChild(card("CPA", fmt(ads.summary.cpa), "광고비/전환"));

    drawLine(document.getElementById("roasChart"), ads.trends.daily.map(r=>r.roas||0));

    const tb=document.querySelector("#topCampaigns tbody");
    ads.tables.top_campaigns.forEach(r=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${r.channel}</td><td>${r.campaign_name}</td><td>${(r.roas||0).toFixed(2)}</td><td>${fmt(r.cost)}</td><td>${fmt(r.revenue)}</td>`;
      tb.appendChild(tr);
    });
  }catch(e){
    alerts.textContent="광고 JSON 로드 실패: "+e.message+" (generate_dashboard_json.py 실행 후 out/에 JSON 생성)";
  }

  try{
    const infl = await loadJson("/out/dashboard_influencer_kpi.json");
    const cards=document.getElementById("inflKpiCards");
    cards.appendChild(card("평균 Total", (infl.summary.avg_total||0).toFixed(1), ""));
    cards.appendChild(card("평균 Fit", (infl.summary.avg_fit||0).toFixed(1), "타겟 적합도"));
    cards.appendChild(card("평균 Risk", (infl.summary.avg_risk||0).toFixed(1), "높을수록 위험"));
    cards.appendChild(card("평균 Performance", (infl.summary.avg_perf||0).toFixed(1), ""));
    const tb=document.querySelector("#inflTable tbody");
    infl.tables.influencers.forEach(r=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${r.handle}</td><td>${r.total.toFixed(1)}</td><td>${r.fit.toFixed(1)}</td><td>${r.risk.toFixed(1)}</td><td>${r.performance.toFixed(1)}</td>`;
      tb.appendChild(tr);
    });
  }catch(e){
    // optional
  }
})();
</script>
</body>
</html>
