services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build: ./services/gateway-go
    environment:
      DRY_RUN: ${DRY_RUN}
      GATEWAY_PORT: ${GATEWAY_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AI_BASE_URL: ${AI_BASE_URL}
      CONNECTOR_BASE_URL: ${CONNECTOR_BASE_URL}
      MAX_DAILY_BUDGET_CHANGE_PCT: ${MAX_DAILY_BUDGET_CHANGE_PCT}
      MIN_CONFIDENCE_FOR_AUTO: ${MIN_CONFIDENCE_FOR_AUTO}
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8080:8080"]

  ai:
    build: ./services/ai-python
    ports: ["8001:8001"]

  connectors:
    build: ./services/connectors-node
    environment:
      DRY_RUN: ${DRY_RUN}
    ports: ["3001:3001"]
