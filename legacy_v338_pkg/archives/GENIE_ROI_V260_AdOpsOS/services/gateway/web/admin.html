<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GENIE_ROI V260 Admin</title>
<style>
body{font-family:system-ui; margin:20px;}
.row{display:flex; gap:16px; flex-wrap:wrap;}
.card{border:1px solid #ddd; border-radius:12px; padding:12px; min-width:280px;}
table{border-collapse:collapse; width:100%;}
th,td{border-bottom:1px solid #eee; padding:8px; text-align:left; font-size:13px;}
input,select,button{padding:8px; border-radius:8px; border:1px solid #ccc;}
button{cursor:pointer;}
.muted{color:#666; font-size:12px;}
code{background:#f6f6f6; padding:2px 6px; border-radius:6px;}
</style></head>
<body>
<h1>GENIE_ROI V260 Admin</h1>
<div class="muted">Use <code>X-Role</code> header (viewer/operator/admin). Ops also needs <code>X-Ops-Token</code>.</div>

<div class="row" style="margin-top:16px;">
  <div class="card">
    <h3>Role</h3>
    <select id="role">
      <option value="viewer">viewer</option>
      <option value="operator">operator</option>
      <option value="admin">admin</option>
    </select>
    <h3 style="margin-top:10px;">Ops token</h3>
    <input id="opsToken" placeholder="change-me"/>
    <button style="margin-top:10px;" onclick="refreshAll()">Refresh</button>
  </div>

  <div class="card">
    <h3>Run workflow</h3>
    <input id="tenant" value="demo" placeholder="tenant_id"/><br/><br/>
    <input id="user" value="alice" placeholder="user_id"/><br/><br/>
    <input id="objective" value="maximize_roas" placeholder="objective"/><br/><br/>
    <input id="channels" value="meta,naver" placeholder="channels comma"/><br/><br/>
    <button onclick="runWorkflow()">Run</button>
    <div id="runOut" class="muted" style="margin-top:8px;"></div>
  </div>

  <div class="card">
    <h3>Ops snapshot</h3>
    <pre id="ops" style="white-space:pre-wrap; font-size:12px;"></pre>
  </div>
</div>

<div class="row" style="margin-top:16px;">
  <div class="card" style="flex:1;">
    <h3>Executions</h3>
    <table id="execTbl"><thead><tr><th>id</th><th>status</th><th>confidence</th><th>requested</th></tr></thead><tbody></tbody></table>
  </div>
  <div class="card" style="flex:1;">
    <h3>Outbox (ops)</h3>
    <table id="outboxTbl"><thead><tr><th>id</th><th>exec</th><th>status</th><th>attempts</th></tr></thead><tbody></tbody></table>
  </div>
  <div class="card" style="flex:1;">
    <h3>DLQ (ops)</h3>
    <pre id="dlq" style="white-space:pre-wrap; font-size:12px;"></pre>
  </div>
</div>

<script>
const api = (path, opts={}) => fetch(path, opts).then(r=>r.json());
function hdrs(extra={}) {
  const role = document.getElementById('role').value;
  const opsToken = document.getElementById('opsToken').value;
  const h = {"Content-Type":"application/json","X-Role":role, ...extra};
  if (opsToken) h["X-Ops-Token"] = opsToken;
  return h;
}
async function refreshAll(){
  const execs = await api('/v260/admin/api/executions', {headers: hdrs()});
  const tbody = document.querySelector('#execTbl tbody'); tbody.innerHTML = '';
  (execs.items||[]).forEach(x=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${x.execution_id.slice(0,10)}…</td><td>${x.status}</td><td>${(x.confidence??'')}</td><td>${x.requested_at}</td>`;
    tbody.appendChild(tr);
  });

  const ops = await api('/v260/ops/metrics', {headers: hdrs()});
  document.getElementById('ops').textContent = JSON.stringify(ops, null, 2);

  const out = await api('/v260/ops/outbox', {headers: hdrs()});
  const ot = document.querySelector('#outboxTbl tbody'); ot.innerHTML='';
  (out.items||[]).forEach(x=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${x.id}</td><td>${(x.execution_id||'').slice(0,10)}…</td><td>${x.status}</td><td>${x.attempts}</td>`;
    ot.appendChild(tr);
  });

  const dlq = await api('/v260/ops/dlq', {headers: hdrs()});
  document.getElementById('dlq').textContent = JSON.stringify(dlq, null, 2);
}
async function runWorkflow(){
  const tenant = document.getElementById('tenant').value;
  const user = document.getElementById('user').value;
  const objective = document.getElementById('objective').value;
  const channels = document.getElementById('channels').value.split(',').map(s=>s.trim()).filter(Boolean);
  const body = {tenant_id:tenant, user_id:user, objective, budget_delta_limit_pct:20, channels, shadow_mode:true};
  const r = await fetch('/v260/workflows/run', {method:'POST', headers: hdrs({"Idempotency-Key":"ui-"+Date.now()}), body: JSON.stringify(body)});
  const j = await r.json();
  document.getElementById('runOut').textContent = JSON.stringify(j);
  refreshAll();
}
refreshAll();
</script>
</body></html>
