services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: genie
      POSTGRES_PASSWORD: genie
      POSTGRES_DB: genie
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./ops/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  gateway:
    build: ./services/gateway
    env_file: .env
    depends_on:
      - db
      - ai
      - connectors
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  ai:
    build: ./services/ai
    env_file: .env
    ports:
      - "${AI_PORT:-8000}:8000"

  connectors:
    build: ./services/connectors
    env_file: .env
    ports:
      - "${CONNECTORS_PORT:-3000}:3000"

volumes:
  dbdata:
